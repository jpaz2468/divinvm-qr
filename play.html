<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DIVINVM · Play</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config.js"></script>
  <style>
    :root{
      --fondo:#0b0806;
      --fondo2:#1a120d;
      --panel:#17100c;
      --dorado:#e0bb73;
      --dorado2:#f6d78e;
      --marfil:#f3ead7;
      --sombra:rgba(0,0,0,.45);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%}
    body{
      min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;
      font-family:Georgia, "Times New Roman", serif;
      background:radial-gradient(circle at top, #2b1f16 0%, var(--fondo) 58%), linear-gradient(135deg, var(--fondo2), var(--fondo));
      color:var(--marfil);overflow:hidden;-webkit-tap-highlight-color: transparent;
    }
    .halo{
      position:fixed;inset:0;pointer-events:none;
      background:
        radial-gradient(circle at 20% 20%, rgba(224,187,115,.08), transparent 25%),
        radial-gradient(circle at 80% 30%, rgba(224,187,115,.05), transparent 22%),
        radial-gradient(circle at 50% 80%, rgba(224,187,115,.04), transparent 24%);
      animation:respira 6s ease-in-out infinite;
    }
    .marco{
      width:min(92vw, 860px);min-height:64vh;border:2px solid rgba(224,187,115,.65);border-radius:28px;
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(0,0,0,.08)), var(--panel);
      box-shadow:0 22px 70px var(--sombra), inset 0 0 0 2px rgba(224,187,115,.12);
      display:flex;justify-content:center;align-items:center;padding:30px;position:relative;overflow:hidden;
    }
    .marco::before{
      content:"";position:absolute;inset:12px;border:1px solid rgba(224,187,115,.16);border-radius:18px;pointer-events:none;
    }
    .contenido{width:100%;text-align:center;position:relative;z-index:2;animation:entrada .7s ease}
    .sello{font-size:13px;letter-spacing:.34em;text-transform:uppercase;color:var(--dorado);margin-bottom:10px;opacity:.95}
    .titulo{font-size:clamp(16px, 2.2vw, 24px);letter-spacing:.18em;text-transform:uppercase;color:rgba(243,234,215,.80);margin-bottom:30px}
    .icono{font-size:clamp(34px, 6vw, 56px);color:rgba(246,215,142,.85);margin-bottom:18px;animation:flotar 3s ease-in-out infinite;text-shadow:0 0 18px rgba(224,187,115,.18)}
    .mensaje{min-height:1.2em;font-size:clamp(36px, 7vw, 68px);font-weight:700;line-height:1.08;color:var(--marfil);text-shadow:0 2px 10px rgba(0,0,0,.45);transition:all .35s ease;padding:0 8px}
    .sub{min-height:28px;margin-top:18px;font-size:clamp(14px, 2vw, 20px);color:rgba(243,234,215,.62);letter-spacing:.10em;text-transform:uppercase}
    .premio .mensaje{
      font-size:clamp(44px, 9vw, 84px);color:var(--dorado2);
      text-shadow:0 0 10px rgba(246,215,142,.55),0 0 30px rgba(246,215,142,.40),0 0 56px rgba(224,187,115,.25);
      animation:destello .8s ease;letter-spacing:.06em;
    }
    .premio .icono{color:var(--dorado2);text-shadow:0 0 12px rgba(246,215,142,.55),0 0 28px rgba(246,215,142,.30);transform:scale(1.08)}
    .destello{position:absolute;inset:0;pointer-events:none;opacity:0;background:radial-gradient(circle, rgba(246,215,142,.18) 0%, transparent 45%)}
    .premio .destello{animation:flash 1s ease}
    .cargando{opacity:.8}
    .error{color:#ffcbc0}
    @keyframes respira{0%,100%{opacity:.85}50%{opacity:1}}
    @keyframes flotar{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
    @keyframes destello{0%{transform:scale(.88);opacity:.35}55%{transform:scale(1.06)}100%{transform:scale(1)}}
    @keyframes flash{0%{opacity:0}30%{opacity:1}100%{opacity:0}}
    @keyframes entrada{from{opacity:0;transform:translateY(12px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
  </style>
</head>
<body>
  <div class="halo"></div>

  <div class="marco" id="marco">
    <div class="destello"></div>
    <div class="contenido">
      <div class="sello" id="brandTop">DIVINVM</div>
      <div class="titulo" id="brandSub">Museo Mágico del Vino</div>
      <div class="icono" id="icono">✧</div>
      <div class="mensaje cargando" id="mensaje">Consultando a la botella…</div>
      <div class="sub" id="sub"></div>
    </div>
  </div>

  <script>
    const CONFIG_FALLBACK = {
      brandTop: "DIVINVM",
      brandSub: "Museo Mágico del Vino",
      premioText: "PREMIO",
      loseText: "Este no es tu vino"
    };

    const cfg = window.DIVINVM_CONFIG || {};
    const brandTopEl = document.getElementById("brandTop");
    const brandSubEl = document.getElementById("brandSub");
    const mensajeEl = document.getElementById("mensaje");
    const subEl = document.getElementById("sub");
    const marco = document.getElementById("marco");
    const icono = document.getElementById("icono");

    function applyBranding(b) {
      brandTopEl.textContent = b.brand_top || CONFIG_FALLBACK.brandTop;
      brandSubEl.textContent = b.brand_sub || CONFIG_FALLBACK.brandSub;
    }

    async function main() {
      try {
        if (!cfg.SUPABASE_URL || !cfg.SUPABASE_ANON_KEY) {
          throw new Error("Falta configurar SUPABASE_URL o SUPABASE_ANON_KEY en config.js");
        }

        const client = window.supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY);

        const { data: branding, error: brandingError } = await client.rpc('public_get_branding');
        if (!brandingError && branding && branding.length) applyBranding(branding[0]);
        else applyBranding({});

        const { data, error } = await client.rpc('public_play_step');
        if (error) throw error;

        const row = Array.isArray(data) ? data[0] : data;
        const message = row?.message || CONFIG_FALLBACK.loseText;
        const isPrize = !!row?.is_prize;

        mensajeEl.classList.remove("cargando", "error");
        mensajeEl.textContent = message;
        subEl.textContent = "";

        if (isPrize) {
          marco.classList.add("premio");
          icono.textContent = "✦";
          if (navigator.vibrate) navigator.vibrate([120, 60, 120]);
        } else {
          marco.classList.remove("premio");
          icono.textContent = "✧";
          if (navigator.vibrate) navigator.vibrate(80);
        }
      } catch (e) {
        console.error(e);
        applyBranding({});
        mensajeEl.classList.remove("cargando");
        mensajeEl.classList.add("error");
        mensajeEl.textContent = "No disponible";
        subEl.textContent = "Revisa la configuración";
      }
    }

    main();
  </script>
</body>
</html>

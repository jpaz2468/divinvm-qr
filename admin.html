<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DIVINVM · Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config.js"></script>
  <style>
    :root{
      --fondo:#0b0806; --panel:#17100c; --dorado:#e0bb73; --dorado2:#f6d78e; --marfil:#f3ead7;
      --gris:#cbbfa8; --sombra:rgba(0,0,0,.45); --rojo:#7c2a2a;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%}
    body{
      min-height:100vh;padding:24px;font-family:Georgia, "Times New Roman", serif;
      background:radial-gradient(circle at top, #2b1f16 0%, #0b0806 58%), linear-gradient(135deg, #1a120d, #0b0806);
      color:var(--marfil);
    }
    .panel{max-width:760px;margin:0 auto;border:2px solid rgba(224,187,115,.55);border-radius:24px;background:#17100c;box-shadow:0 20px 60px var(--sombra);padding:28px}
    .top{margin-bottom:24px}
    .top .mini{color:var(--dorado);letter-spacing:.28em;text-transform:uppercase;font-size:12px;margin-bottom:10px}
    .top h1{font-size:clamp(28px,5vw,44px);color:var(--dorado2);margin-bottom:6px}
    .top p{opacity:.8;line-height:1.5}
    .bloque{margin-top:22px;padding:18px;border:1px solid rgba(224,187,115,.16);border-radius:16px;background:rgba(255,255,255,.02)}
    .label{font-size:12px;text-transform:uppercase;letter-spacing:.18em;color:var(--gris);margin-bottom:10px}
    .estado{font-size:clamp(26px, 5vw, 42px);font-weight:700;color:#fff2cb}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:18px}
    .dato{padding:14px;border-radius:14px;background:rgba(255,255,255,.03);border:1px solid rgba(224,187,115,.10)}
    .dato b{display:block;color:var(--dorado2);margin-bottom:6px}
    .botones{display:flex;gap:12px;flex-wrap:wrap;margin-top:22px}
    button{border:none;border-radius:12px;padding:14px 18px;font-weight:700;cursor:pointer;font-size:15px}
    .btn-principal{background:var(--dorado);color:#17100c}
    .btn-secundario{background:#2b2118;color:var(--marfil);border:1px solid rgba(224,187,115,.18)}
    .btn-reset{background:var(--rojo);color:white}
    .ok{color:#a7d5b1;margin-top:14px;min-height:22px}
    .error{color:#ffb2b2;margin-top:14px;min-height:22px}
    .campos{display:grid;gap:12px;margin-top:14px}
    input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid rgba(224,187,115,.18);background:#110c09;color:var(--marfil);font-size:15px}
    .nota{font-size:13px;opacity:.75;margin-top:8px}
  </style>
</head>
<body>
  <div class="panel">
    <div class="top">
      <div class="mini">Panel secreto</div>
      <h1>DIVINVM · Admin</h1>
      <p>Consulta el próximo estado, resetea a P1-1 y personaliza la marca sin gastar ninguna jugada.</p>
    </div>

    <div class="bloque">
      <div class="label">Secreto de administrador</div>
      <input id="adminSecret" placeholder="Introduce tu secreto de administrador" />
      <div class="nota">Guárdalo también en <strong>config.js</strong> si quieres que se rellene solo.</div>
    </div>

    <div class="bloque">
      <div class="label">Próximo estado</div>
      <div class="estado" id="estado">Cargando…</div>

      <div class="grid">
        <div class="dato">
          <b>Patrón actual</b>
          <span id="modoActual">—</span>
        </div>
        <div class="dato">
          <b>Siguiente paso</b>
          <span id="pasoActual">—</span>
        </div>
      </div>

      <div class="botones">
        <button class="btn-principal" id="btnRefrescar">Actualizar</button>
        <button class="btn-reset" id="btnReset">Reset a P1-1</button>
      </div>

      <div class="ok" id="ok"></div>
      <div class="error" id="error"></div>
    </div>

    <div class="bloque">
      <div class="label">Personalización</div>
      <div class="campos">
        <input id="brandTop" placeholder="Nombre principal" />
        <input id="brandSub" placeholder="Subtítulo" />
        <input id="premioText" placeholder="Texto de premio" />
        <input id="loseText" placeholder="Texto de pierde" />
      </div>

      <div class="botones">
        <button class="btn-secundario" id="btnGuardarBranding">Guardar branding</button>
      </div>
    </div>
  </div>

  <script>
    const cfg = window.DIVINVM_CONFIG || {};
    const client = (cfg.SUPABASE_URL && cfg.SUPABASE_ANON_KEY)
      ? window.supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY)
      : null;

    const estado = document.getElementById("estado");
    const modoActual = document.getElementById("modoActual");
    const pasoActual = document.getElementById("pasoActual");
    const ok = document.getElementById("ok");
    const error = document.getElementById("error");

    const brandTop = document.getElementById("brandTop");
    const brandSub = document.getElementById("brandSub");
    const premioText = document.getElementById("premioText");
    const loseText = document.getElementById("loseText");
    const adminSecret = document.getElementById("adminSecret");
    adminSecret.value = cfg.ADMIN_SECRET || "";

    function secretValue() { return adminSecret.value.trim(); }

    async function cargarEstado() {
      ok.textContent = "";
      error.textContent = "";
      try {
        if (!client) throw new Error("Falta configurar Supabase en config.js");
        if (!secretValue()) throw new Error("Introduce el secreto de administrador");

        const { data, error: rpcError } = await client.rpc("admin_get_state", { p_secret: secretValue() });
        if (rpcError) throw rpcError;

        const row = Array.isArray(data) ? data[0] : data;
        estado.textContent = row?.next_state || "P1-1";
        modoActual.textContent = row?.mode || "1";
        pasoActual.textContent = row?.next_step || "1";
        brandTop.value = row?.brand_top || "DIVINVM";
        brandSub.value = row?.brand_sub || "Museo Mágico del Vino";
        premioText.value = row?.premio_text || "PREMIO";
        loseText.value = row?.lose_text || "Este no es tu vino";
      } catch (err) {
        console.error(err);
        error.textContent = err.message || "Error al consultar el estado.";
      }
    }

    async function resetear() {
      ok.textContent = "";
      error.textContent = "";
      try {
        if (!client) throw new Error("Falta configurar Supabase en config.js");
        if (!secretValue()) throw new Error("Introduce el secreto de administrador");

        const { error: rpcError } = await client.rpc("admin_reset_state", { p_secret: secretValue() });
        if (rpcError) throw rpcError;

        ok.textContent = "Reseteado a P1-1.";
        await cargarEstado();
      } catch (err) {
        console.error(err);
        error.textContent = err.message || "Error al resetear.";
      }
    }

    async function guardarBranding() {
      ok.textContent = "";
      error.textContent = "";
      try {
        if (!client) throw new Error("Falta configurar Supabase en config.js");
        if (!secretValue()) throw new Error("Introduce el secreto de administrador");

        const { error: rpcError } = await client.rpc("admin_update_branding", {
          p_secret: secretValue(),
          p_brand_top: brandTop.value.trim(),
          p_brand_sub: brandSub.value.trim(),
          p_premio_text: premioText.value.trim(),
          p_lose_text: loseText.value.trim()
        });
        if (rpcError) throw rpcError;

        ok.textContent = "Branding guardado.";
      } catch (err) {
        console.error(err);
        error.textContent = err.message || "Error al guardar branding.";
      }
    }

    document.getElementById("btnRefrescar").addEventListener("click", cargarEstado);
    document.getElementById("btnReset").addEventListener("click", resetear);
    document.getElementById("btnGuardarBranding").addEventListener("click", guardarBranding);

    if (client) cargarEstado();
    else error.textContent = "Configura SUPABASE_URL y SUPABASE_ANON_KEY en config.js";
  </script>
</body>
</html>
